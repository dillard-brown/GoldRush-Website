<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1C1C1E"/>

  <!-- Dump bed -->
  <rect x="2" y="6" width="18" height="13" rx="2" fill="#C9A84C"/>

  <!-- Tailgate hint -->
  <rect x="2" y="6" width="2.5" height="13" rx="1" fill="#a8892e"/>

  <!-- Cab body -->
  <rect x="20" y="11" width="10" height="8" rx="2" fill="#C9A84C"/>

  <!-- Cab window -->
  <rect x="21.5" y="12.5" width="6.5" height="4" rx="1" fill="#1C1C1E" opacity="0.55"/>

  <!-- Headlight -->
  <rect x="29" y="15" width="1.5" height="2" rx="0.5" fill="#ffe08a"/>

  <!-- Chassis/frame -->
  <rect x="1" y="19" width="30" height="2" rx="1" fill="#555555"/>

  <!-- Rear wheel -->
  <circle cx="8" cy="25" r="4.5" fill="#444444"/>
  <circle cx="8" cy="25" r="2" fill="#C9A84C"/>
  <circle cx="8" cy="25" r="0.7" fill="#1C1C1E"/>

  <!-- Front wheel -->
  <circle cx="24" cy="25" r="4.5" fill="#444444"/>
  <circle cx="24" cy="25" r="2" fill="#C9A84C"/>
  <circle cx="24" cy="25" r="0.7" fill="#1C1C1E"/>
</svg>
